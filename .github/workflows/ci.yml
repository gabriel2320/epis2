name: CI

# MF-CON-11 — tier required (PR). Paridad extendida: ci-nightly.yml · experimental: ci-experimental.yml

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  required:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: epis2
          POSTGRES_PASSWORD: epis2
          POSTGRES_DB: epis2
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U epis2 -d epis2"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://epis2_app:epis2@localhost:5432/epis2
      VITE_ENABLE_DUAL_CHART_MODES: 'false'
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: npm
      - run: npm ci
      - run: npm run build:ci-fixtures-chain
      - run: npm run db:migrate
      - run: npm run quality:required

  e2e-dual-chart:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: epis2
          POSTGRES_PASSWORD: epis2
          POSTGRES_DB: epis2
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U epis2 -d epis2"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://epis2_app:epis2@localhost:5432/epis2
      VITE_ENABLE_DUAL_CHART_MODES: 'true'
      VITE_ENABLE_CICA_UI: 'false'
      VITE_EPIS2_LOAD_DEV_FIXTURES: 'true'
      CI: 'true'
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: npm
      - run: npm ci
      - run: npm run build:ci-fixtures-chain
      - run: npm run db:migrate
      - run: npm run quality:gate -- quality:dual-chart-gate
      - run: npx playwright install --with-deps chromium
      - run: npm run tool:script -- build:packages
      - run: npm run build -w @epis2/web
      - run: npm run test:e2e:dual-chart -w @epis2/web
