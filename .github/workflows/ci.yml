name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  check:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: epis2
          POSTGRES_PASSWORD: epis2
          POSTGRES_DB: epis2
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U epis2 -d epis2"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://epis2:epis2@localhost:5432/epis2
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci
      - run: npm run build -w @epis2/contracts
      - run: npm run db:migrate
      - run: npm run check
      - run: npm run test
      - run: npm run db:validate
      - run: npm run quality:golden-journey
