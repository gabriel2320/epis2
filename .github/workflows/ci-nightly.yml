name: CI Nightly

# MF-CON-11 — paridad extendida (tools/gates/nightly.json)

on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:

jobs:
  nightly:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: epis2
          POSTGRES_PASSWORD: epis2
          POSTGRES_DB: epis2
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U epis2 -d epis2"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://epis2_app:epis2@localhost:5432/epis2
      VITE_ENABLE_DUAL_CHART_MODES: 'false'
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run quality:nightly
      - run: npm audit --omit=dev --audit-level=high
