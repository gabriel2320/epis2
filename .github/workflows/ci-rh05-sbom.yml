name: RH-05 CycloneDX SBOM (report-only)

# PROG-RELEASE-HARDENING — artefacto SBOM en tags y schedule

on:
  push:
    tags: ['v*']
  schedule:
    - cron: '0 5 * * 4'
  workflow_dispatch:

permissions:
  contents: read
  actions: read

jobs:
  sbom:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: npm
      - run: npm ci
      - run: mkdir -p reports/ci
      - run: npx @cyclonedx/cyclonedx-npm --output-file reports/ci/rh05-sbom.json
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: rh05-sbom-${{ github.sha }}
          path: reports/ci/rh05-sbom.json
          retention-days: 90
