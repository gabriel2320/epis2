name: RH-11 Dependency review (blocking) + audit report

# PROG-SECURITY-PROMOTE — dependency-review blocking (critical). npm-audit report-only.

on:
  pull_request:
    branches: [main, master]
  schedule:
    - cron: '0 5 * * 3'
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  dependency-review:
    name: dependency-review (blocking)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: critical
          comment-summary-in-pr: always

  npm-audit-report:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: npm
      - run: npm ci
      - run: mkdir -p reports/ci
      - run: npm audit --omit=dev --json > reports/ci/rh04-npm-audit.json || true
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: rh11-npm-audit-${{ github.sha }}
          path: reports/ci/rh04-npm-audit.json
          retention-days: 30
