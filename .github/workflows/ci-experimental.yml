name: CI Experimental

# MF-CON-11 — gates pesados / opcionales (tools/gates/experimental.json)

on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * 0'

jobs:
  experimental:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: epis2
          POSTGRES_PASSWORD: epis2
          POSTGRES_DB: epis2
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U epis2 -d epis2"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://epis2_app:epis2@localhost:5432/epis2
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: npm
      - run: npm ci
      - run: npm run build:ci-fixtures-chain
      - run: npm run db:migrate
      - run: npm run quality:experimental
