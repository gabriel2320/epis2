# Plan G — actualizaciones de dependencias (PROG-CONSOLIDATE / auditoría DevOps)
# Tramo 4 PROG-DEPS-HYGIENE — ignores persistentes: docs/product/EPIS2_DEPENDABOT_TRIAGE.md
version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      epis2-production:
        patterns:
          - '*'
        update-types:
          - minor
          - patch
    ignore:
      # PROG-ZOD4-MIGRATION — no Zod 4 en master (RH + CONSOLIDATION_FREEZE)
      - dependency-name: zod
        update-types:
          - version-update:semver-major
      # engines.node >=20 <25 — typings 25+ fuera de rango
      - dependency-name: '@types/node'
        versions:
          - '>= 25'

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 3
    ignore:
      # Evaluar checkout v6 tras estabilizar Actions v5 (PROG-POST-RC3 Tramo 4)
      - dependency-name: actions/checkout
        update-types:
          - version-update:semver-major

  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 3
