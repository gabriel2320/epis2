# EPIS2 — infraestructura Docker
#
# Ollama por defecto: instalación nativa en el host (Windows/macOS/Linux).
# Los servicios en contenedor alcanzan el host vía host.docker.internal:11434.
# Contenedor Ollama opcional: docker compose --profile bundled-ollama up -d ollama
#
# LanguageTool opcional (spellcheck clínico):
#   docker compose --profile languagetool up -d languagetool
#   LANGUAGETOOL_BASE_URL=http://127.0.0.1:8010
#
# OpenTelemetry collector opcional (MF-TOOL-05):
#   docker compose --profile observability up -d otel-collector
#   OTEL_ENABLED=true OTEL_EXPORTER_OTLP_ENDPOINT=http://127.0.0.1:4318 npm run dev:api
#
# Langfuse local opcional (MF-TOOL-06):
#   npm run stack:langfuse
#   UI http://127.0.0.1:3100 · login dev@epis2.local / epis2-dev-only

x-ollama-env: &ollama-env
  OLLAMA_BASE_URL: http://host.docker.internal:11434
  OLLAMA_MODEL: qwen3:8b

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: epis2-postgres
    environment:
      POSTGRES_USER: epis2
      POSTGRES_PASSWORD: epis2
      POSTGRES_DB: epis2
    ports:
      - '5433:5432'
    volumes:
      - epis2_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U epis2 -d epis2']
      interval: 5s
      timeout: 5s
      retries: 5

  languagetool:
    profiles:
      - languagetool
    image: silencio/languagetool:6.5
    container_name: epis2-languagetool
    environment:
      langtool_languageModel: /ngrams
    ports:
      - '8010:8010'
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://127.0.0.1:8010/v2/languages >/dev/null || exit 1']
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 45s

  ollama:
    profiles:
      - bundled-ollama
    # Pin explícito — evitar :latest en auditoría/reproducibilidad (MF-CON-DOCKER)
    image: ollama/ollama:0.6.8
    container_name: epis2-ollama
    ports:
      - '11434:11434'
    volumes:
      - epis2_ollama_data:/root/.ollama
    healthcheck:
      test: ['CMD', 'ollama', 'list']
      interval: 10s
      timeout: 10s
      retries: 3
      start_period: 30s

  otel-collector:
    profiles:
      - observability
    image: otel/opentelemetry-collector:0.120.0
    container_name: epis2-otel-collector
    command: ['--config=/etc/otelcol/config.yaml']
    volumes:
      - ./infra/otel/collector-config.yaml:/etc/otelcol/config.yaml:ro
    ports:
      - '4318:4318'

  langfuse-postgres:
    profiles:
      - langfuse
    image: postgres:16-alpine
    container_name: epis2-langfuse-postgres
    environment:
      POSTGRES_USER: langfuse
      POSTGRES_PASSWORD: langfuse
      POSTGRES_DB: langfuse
    volumes:
      - epis2_langfuse_pg:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U langfuse -d langfuse']
      interval: 5s
      timeout: 5s
      retries: 10

  langfuse:
    profiles:
      - langfuse
    image: langfuse/langfuse:2.95.0
    container_name: epis2-langfuse
    depends_on:
      langfuse-postgres:
        condition: service_healthy
    ports:
      - '3100:3000'
    environment:
      DATABASE_URL: postgresql://langfuse:langfuse@langfuse-postgres:5432/langfuse
      NEXTAUTH_SECRET: epis2-dev-langfuse-nextauth-secret-min-32
      SALT: epis2-dev-langfuse-salt-min-32-chars
      ENCRYPTION_KEY: d4f11628305d24f8c5b9e78f99f8bb9ac35615f462b90b08091d74c34687cd23
      NEXTAUTH_URL: http://127.0.0.1:3100
      TELEMETRY_ENABLED: 'false'
      LANGFUSE_ENABLE_EXPERIMENTAL_FEATURES: 'false'
      LANGFUSE_INIT_ORG_ID: epis2-dev
      LANGFUSE_INIT_ORG_NAME: EPIS2 Dev
      LANGFUSE_INIT_PROJECT_ID: epis2-local-ai
      LANGFUSE_INIT_PROJECT_NAME: EPIS2 Local AI
      LANGFUSE_INIT_PROJECT_PUBLIC_KEY: lf_pk_epis2_dev_local
      LANGFUSE_INIT_PROJECT_SECRET_KEY: lf_sk_epis2_dev_local
      LANGFUSE_INIT_USER_EMAIL: dev@epis2.local
      LANGFUSE_INIT_USER_NAME: EPIS2 Dev
      LANGFUSE_INIT_USER_PASSWORD: epis2-dev-only

volumes:
  epis2_pg_data:
  epis2_ollama_data:
  epis2_langfuse_pg:
