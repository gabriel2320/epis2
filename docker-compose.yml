# EPIS2 — infraestructura Docker
#
# Ollama por defecto: instalación nativa en el host (Windows/macOS/Linux).
# Los servicios en contenedor alcanzan el host vía host.docker.internal:11434.
# Contenedor Ollama opcional: docker compose --profile bundled-ollama up -d ollama
#
# LanguageTool opcional (spellcheck clínico):
#   docker compose --profile languagetool up -d languagetool
#   LANGUAGETOOL_BASE_URL=http://127.0.0.1:8010

x-ollama-env: &ollama-env
  OLLAMA_BASE_URL: http://host.docker.internal:11434
  OLLAMA_MODEL: qwen3:8b

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: epis2-postgres
    environment:
      POSTGRES_USER: epis2
      POSTGRES_PASSWORD: epis2
      POSTGRES_DB: epis2
    ports:
      - '5433:5432'
    volumes:
      - epis2_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U epis2 -d epis2']
      interval: 5s
      timeout: 5s
      retries: 5

  languagetool:
    profiles:
      - languagetool
    image: silencio/languagetool:6.5
    container_name: epis2-languagetool
    environment:
      langtool_languageModel: /ngrams
    ports:
      - '8010:8010'
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://127.0.0.1:8010/v2/languages >/dev/null || exit 1']
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 45s

  ollama:
    profiles:
      - bundled-ollama
    image: ollama/ollama:latest
    container_name: epis2-ollama
    ports:
      - '11434:11434'
    volumes:
      - epis2_ollama_data:/root/.ollama
    healthcheck:
      test: ['CMD', 'ollama', 'list']
      interval: 10s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  epis2_pg_data:
  epis2_ollama_data:
